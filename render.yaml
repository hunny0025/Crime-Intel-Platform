databases:
  - name: crime-intel-postgres
    databaseName: crime_intel
    user: cip
    plan: free

services:
  # Neo4j Graph Database
  - type: web
    name: crime-intel-neo4j
    env: docker
    dockerfilePath: Dockerfile.neo4j
    dockerContext: .
    plan: free
    port: 7474
    envVars:
      - key: NEO4J_AUTH
        value: neo4j/crimeintel2024
      # Neo4j 5.x Memory Configuration (Lowercase 'm')
      - key: NEO4J_server_memory_heap_initial__size
        value: 128m
      - key: NEO4J_server_memory_heap_max__size
        value: 128m
      - key: NEO4J_server_memory_pagecache_size
        value: 64m
      # Legacy Neo4j 4.x Memory Configuration Fallback
      - key: NEO4J_dbms_memory_heap_initial__size
        value: 128m
      - key: NEO4J_dbms_memory_heap_max__size
        value: 128m
      - key: NEO4J_dbms_memory_pagecache_size
        value: 64m

  # MinIO Object Storage
  - type: web
    name: crime-intel-minio
    env: docker
    dockerfilePath: Dockerfile.minio
    dockerContext: .
    plan: free
    port: 9000
    envVars:
      - key: MINIO_ROOT_USER
        value: minioadmin
      - key: MINIO_ROOT_PASSWORD
        value: minioadmin

  # OSINT Intelligence Service
  - type: web
    name: crime-intel-osint
    env: docker
    dockerfilePath: osint-service/Dockerfile
    dockerContext: osint-service
    plan: free
    port: 8001
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crime-intel-postgres
          property: connectionString
      - key: NEO4J_URI
        value: bolt://crime-intel-neo4j:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: crimeintel2024
      - key: NEO4J_DATABASE
        value: neo4j

  # Main FastAPI Backend Application
  - type: web
    name: crime-intel-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    port: 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crime-intel-postgres
          property: connectionString
      - key: TEST_DATABASE_URL
        value: ""
      - key: NEO4J_URI
        value: bolt://crime-intel-neo4j:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: crimeintel2024
      - key: NEO4J_DATABASE
        value: neo4j
      - key: MINIO_ENDPOINT
        value: crime-intel-minio:9000
      - key: MINIO_ACCESS_KEY
        value: minioadmin
      - key: MINIO_SECRET_KEY
        value: minioadmin
      - key: MINIO_BUCKET
        value: evidence
      - key: MINIO_SECURE
        value: "false"
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "" # User to provide their own Kafka endpoint (e.g. Upstash) or leave blank if skipped
      - key: KAFKA_CONSUMER_GROUP
        value: aire-workers
      - key: SKIP_WAIT_DEPENDENCIES
        value: "true" # Bypass blocking startup checks if external broker is not yet configured
      - key: ALLOWED_ORIGINS
        value: '["http://localhost:3000", "https://crime-intel-frontend.vercel.app"]'
