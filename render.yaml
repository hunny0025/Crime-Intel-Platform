databases:
  - name: crime-intel-postgres
    databaseName: crime_intel
    user: cip
    plan: free

services:
  # OSINT Intelligence Service
  - type: web
    name: crime-intel-osint
    env: docker
    dockerfilePath: osint-service/Dockerfile
    dockerContext: osint-service
    plan: free
    port: 8001
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crime-intel-postgres
          property: connectionString
      - key: NEO4J_URI
        sync: false # Enter your Neo4j AuraDB bolt/neo4j+s URI here (e.g. neo4j+s://xxxxxx.databases.neo4j.io)
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false # Enter your Neo4j AuraDB password here
      - key: NEO4J_DATABASE
        value: neo4j

  # Main FastAPI Backend Application
  - type: web
    name: crime-intel-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    port: 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crime-intel-postgres
          property: connectionString
      - key: TEST_DATABASE_URL
        value: ""
      - key: BACKEND_URL
        sync: false # Enter your deployed Render backend URL here (e.g., https://crime-intel-backend.onrender.com)
      - key: NEO4J_URI
        sync: false # Enter your Neo4j AuraDB bolt/neo4j+s URI here (e.g. neo4j+s://xxxxxx.databases.neo4j.io)
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false # Enter your Neo4j AuraDB password here
      - key: NEO4J_DATABASE
        value: neo4j
      - key: MINIO_ENDPOINT
        value: "local" # Triggers automatic local folder storage fallback
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "" # Bypasses Kafka in favor of the automatic In-Memory Broker fallback
      - key: KAFKA_CONSUMER_GROUP
        value: aire-workers
      - key: SKIP_WAIT_DEPENDENCIES
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false # Enter CORS origins as JSON array, e.g. ["http://localhost:3000", "https://your-frontend.vercel.app"]
