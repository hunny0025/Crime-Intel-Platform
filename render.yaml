services:
  # OSINT Intelligence Service
  - type: web
    name: crime-intel-osint
    env: docker
    dockerfilePath: osint-service/Dockerfile
    dockerContext: osint-service
    plan: free
    port: 8001
    envVars:
      - key: DATABASE_URL
        value: "postgresql://cip:cip_secret@postgres:5432/crime_intel"
      - key: NEO4J_URI
        value: "bolt://neo4j:7687"
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: "password"
      - key: NEO4J_DATABASE
        value: neo4j

  # Main FastAPI Backend Application
  - type: web
    name: crime-intel-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    port: 8000
    envVars:
      - key: DATABASE_URL
        value: "postgresql://cip:cip_secret@postgres:5432/crime_intel"
      - key: TEST_DATABASE_URL
        value: ""
      - key: BACKEND_URL
        value: "http://localhost:8000"
      - key: NEO4J_URI
        value: "bolt://neo4j:7687"
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: "password"
      - key: NEO4J_DATABASE
        value: neo4j
      - key: MINIO_ENDPOINT
        value: "local" # Triggers automatic local folder storage fallback
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: "" # Bypasses Kafka in favor of the automatic In-Memory Broker fallback
      - key: KAFKA_CONSUMER_GROUP
        value: aire-workers
      - key: SKIP_WAIT_DEPENDENCIES
        value: "true"
      - key: ALLOWED_ORIGINS
        value: '["http://localhost:3000", "http://localhost:3001"]'
