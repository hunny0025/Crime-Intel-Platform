# docker-compose.yml — Crime Intel Platform

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cip
      POSTGRES_PASSWORD: cip_secret
      POSTGRES_DB: crime_intel
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip -d crime_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Zookeeper (required by Kafka) ────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka ────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ── Neo4j (Knowledge Graph) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/crimeintel2024
      NEO4J_PLUGINS: '[]'
    ports:
      - "17474:7474"
      - "17687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ── FastAPI Application ──────────────────────────────────────────────
  # Stateless — all state in Postgres/Neo4j/MinIO/Kafka.
  # Safe to run as multiple replicas behind a load balancer.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 1
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://cip:cip_secret@postgres:5432/crime_intel"
      TEST_DATABASE_URL: "postgresql://cip:cip_secret@postgres:5432/crime_intel_test"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "evidence"
      MINIO_SECURE: "false"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # AIRE workers use consumer groups keyed by case_id for per-case ordering
      KAFKA_CONSUMER_GROUP: "aire-workers"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "crimeintel2024"
      NEO4J_DATABASE: "neo4j"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OSINT Intelligence Service (internet egress enabled) ──────────────
  # This service is architecturally SEPARATE from the evidence-processing core.
  # It NEVER reads from evidence_artifacts or chain-of-custody store.
  # It ONLY writes OSINT-derived nodes/relationships into Neo4j
  # with classification_tag='public_osint'.
  osint-service:
    build:
      context: ./osint-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://cip:cip_secret@postgres:5432/crime_intel"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "crimeintel2024"
      NEO4J_DATABASE: "neo4j"
      CRT_SH_URL: "https://crt.sh"
      # Social platform API keys (empty = adapter unavailable)
      TWITTER_BEARER_TOKEN: ""
      GITHUB_TOKEN: ""
      # Blockchain explorer API keys
      BLOCKCHAIN_API_KEY: ""
      ETHERSCAN_API_KEY: ""
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Deception Detection Service (GPU-beneficial, separate scaling) ────
  deception-detection:
    build:
      context: ./deception-detection-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
  neo4jdata:

